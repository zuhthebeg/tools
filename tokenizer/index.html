<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0f1117;
  --bg2: #1a1d27;
  --bg3: #22263a;
  --border: #2e3250;
  --text: #e8eaf6;
  --muted: #7b82b4;
  --accent: #6c63ff;
  --accent2: #00d4aa;
  --danger: #ff6b6b;
  --warn: #ffd166;
  --success: #06d6a0;
  --radius: 12px;
}

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 24px 16px 48px;
}

.container { max-width: 860px; margin: 0 auto; }

header { text-align: center; margin-bottom: 32px; }
header h1 { font-size: 1.9rem; font-weight: 700; letter-spacing: -0.5px; }
header h1 span { color: var(--accent); }
header p { color: var(--muted); margin-top: 6px; font-size: 0.9rem; }

/* 모델 선택 */
.model-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 8px;
  margin-bottom: 20px;
}

.model-btn {
  background: var(--bg2);
  border: 2px solid var(--border);
  border-radius: 10px;
  padding: 10px 12px;
  cursor: pointer;
  transition: all 0.15s;
  text-align: left;
}
.model-btn:hover { border-color: var(--accent); background: var(--bg3); }
.model-btn.active { border-color: var(--accent); background: rgba(108,99,255,0.12); }
.model-btn .model-name { font-size: 0.82rem; font-weight: 600; color: var(--text); }
.model-btn .model-enc { font-size: 0.7rem; color: var(--muted); margin-top: 2px; }
.model-btn .model-ctx { font-size: 0.68rem; color: var(--accent2); margin-top: 1px; }

/* 인코딩 뱃지 */
.enc-badge {
  display: inline-block;
  font-size: 0.65rem;
  padding: 1px 6px;
  border-radius: 4px;
  font-weight: 600;
  margin-top: 4px;
}
.enc-o200k { background: rgba(108,99,255,0.25); color: #a29bfe; }
.enc-cl100k { background: rgba(0,212,170,0.2); color: #00d4aa; }
.enc-p50k { background: rgba(255,209,102,0.2); color: #ffd166; }

/* 텍스트 영역 */
.editor-wrap {
  background: var(--bg2);
  border: 2px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 16px;
  transition: border-color 0.15s;
}
.editor-wrap:focus-within { border-color: var(--accent); }

.editor-toolbar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  background: var(--bg3);
}
.editor-toolbar span { font-size: 0.78rem; color: var(--muted); }
.btn-clear {
  margin-left: auto;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted);
  border-radius: 6px;
  padding: 3px 10px;
  font-size: 0.75rem;
  cursor: pointer;
  transition: all 0.15s;
}
.btn-clear:hover { border-color: var(--danger); color: var(--danger); }

#input-text {
  width: 100%;
  min-height: 200px;
  max-height: 500px;
  resize: vertical;
  background: transparent;
  border: none;
  outline: none;
  padding: 14px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.85rem;
  color: var(--text);
  line-height: 1.6;
}

/* 결과 카드 */
.stats-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
  gap: 10px;
  margin-bottom: 20px;
}

.stat-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  text-align: center;
}
.stat-card .val {
  font-size: 1.7rem;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  line-height: 1;
}
.stat-card .lbl { font-size: 0.72rem; color: var(--muted); margin-top: 4px; }

.val-tokens { color: var(--accent); }
.val-chars { color: var(--accent2); }
.val-words { color: var(--warn); }
.val-cost { color: var(--success); }
.val-ctx { color: var(--text); }

/* 컨텍스트 바 */
.ctx-bar-wrap {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  margin-bottom: 20px;
}
.ctx-bar-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
  font-size: 0.8rem;
}
.ctx-bar-header span:first-child { color: var(--muted); }
.ctx-bar-header span:last-child { font-weight: 600; }
.ctx-bar-bg {
  background: var(--bg3);
  border-radius: 99px;
  height: 8px;
  overflow: hidden;
}
.ctx-bar-fill {
  height: 100%;
  border-radius: 99px;
  transition: width 0.3s, background 0.3s;
}

/* 비용 계산 */
.cost-section {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  margin-bottom: 20px;
}
.cost-section h3 { font-size: 0.8rem; color: var(--muted); margin-bottom: 10px; }
.cost-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
.cost-table th { text-align: left; color: var(--muted); font-weight: 500; padding: 4px 8px 8px; }
.cost-table td { padding: 5px 8px; border-top: 1px solid var(--border); }
.cost-table tr.highlight td { color: var(--accent2); font-weight: 600; }

/* 토큰 시각화 */
.token-viz {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  margin-bottom: 20px;
}
.token-viz h3 { font-size: 0.8rem; color: var(--muted); margin-bottom: 10px; }
#token-display {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.8rem;
  line-height: 1.8;
  word-break: break-all;
  max-height: 160px;
  overflow-y: auto;
}
.tok {
  display: inline;
  padding: 1px 0;
  border-radius: 3px;
  margin: 1px;
}

.tok-colors { /* 7가지 색상 순환 */
  --t0: rgba(108,99,255,0.25);
  --t1: rgba(0,212,170,0.2);
  --t2: rgba(255,107,107,0.2);
  --t3: rgba(255,209,102,0.2);
  --t4: rgba(162,155,254,0.2);
  --t5: rgba(116,185,255,0.2);
  --t6: rgba(253,121,168,0.2);
}

/* 반응형 */
@media (max-width: 600px) {
  header h1 { font-size: 1.4rem; }
  .model-grid { grid-template-columns: repeat(2, 1fr); }
  .stats-row { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-MV8KQGJF" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>

<div class="container">
  <header>
    <h1>LLM <span>토크나이저</span></h1>
    <p>최신 GPT · o시리즈 · Codex 모델 토큰 실시간 계산</p>
  </header>

  <div class="model-grid" id="model-grid"></div>

  <div class="editor-wrap">
    <div class="editor-toolbar">
      <span>입력 텍스트</span>
      <button class="btn-clear" onclick="clearText()">지우기</button>
    </div>
    <textarea id="input-text" placeholder="여기에 텍스트를 입력하세요...&#10;&#10;한국어, 영어, 코드 모두 가능합니다." spellcheck="false"></textarea>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="val val-tokens" id="stat-tokens">0</div>
      <div class="lbl">토큰</div>
    </div>
    <div class="stat-card">
      <div class="val val-chars" id="stat-chars">0</div>
      <div class="lbl">글자 수</div>
    </div>
    <div class="stat-card">
      <div class="val val-words" id="stat-words">0</div>
      <div class="lbl">단어 수</div>
    </div>
    <div class="stat-card">
      <div class="val val-ctx" id="stat-ctx-pct">0%</div>
      <div class="lbl">컨텍스트 사용</div>
    </div>
  </div>

  <div class="ctx-bar-wrap">
    <div class="ctx-bar-header">
      <span id="ctx-model-name">모델 선택</span>
      <span id="ctx-info">0 / 0 tokens</span>
    </div>
    <div class="ctx-bar-bg">
      <div class="ctx-bar-fill" id="ctx-bar" style="width:0%"></div>
    </div>
  </div>

  <div class="cost-section">
    <h3>💰 예상 비용 (입력 기준, 1M 토큰당)</h3>
    <table class="cost-table">
      <thead><tr><th>모델</th><th>$/1M tok</th><th>이 텍스트</th></tr></thead>
      <tbody id="cost-tbody"></tbody>
    </table>
  </div>

  <div class="token-viz">
    <h3>🎨 토큰 시각화 <span style="color:var(--muted);font-weight:400">(색상 = 토큰 경계)</span></h3>
    <div id="token-display" class="tok-colors">텍스트를 입력하면 토큰 단위로 색상이 표시됩니다.</div>
  </div>
</div>

<!-- gpt-tokenizer: pure JS, no WASM -->
<script type="module">
import { encode, decode, isWithinTokenLimit, encodingForModel } from 'https://esm.sh/gpt-tokenizer@2.8.0';

// ===== 모델 정의 =====
const MODELS = [
  // OpenAI 최신
  { id: 'gpt-5',        name: 'GPT-5',         enc: 'o200k_base', ctx: 1000000, input: 15,    group: 'OpenAI' },
  { id: 'gpt-4.1',      name: 'GPT-4.1',        enc: 'o200k_base', ctx: 1000000, input: 2,     group: 'OpenAI' },
  { id: 'gpt-4o',       name: 'GPT-4o',         enc: 'o200k_base', ctx: 128000,  input: 2.5,   group: 'OpenAI' },
  { id: 'gpt-4o-mini',  name: 'GPT-4o mini',    enc: 'o200k_base', ctx: 128000,  input: 0.15,  group: 'OpenAI' },
  // 추론 시리즈
  { id: 'o3',           name: 'o3',             enc: 'o200k_base', ctx: 200000,  input: 10,    group: 'Reasoning' },
  { id: 'o4-mini',      name: 'o4-mini',        enc: 'o200k_base', ctx: 200000,  input: 1.1,   group: 'Reasoning' },
  { id: 'o3-mini',      name: 'o3-mini',        enc: 'o200k_base', ctx: 200000,  input: 1.1,   group: 'Reasoning' },
  { id: 'o1',           name: 'o1',             enc: 'o200k_base', ctx: 200000,  input: 15,    group: 'Reasoning' },
  // Codex
  { id: 'gpt-5.3-codex',name:'GPT-5.3 Codex',  enc: 'o200k_base', ctx: 200000,  input: null,  group: 'Codex' },
  { id: 'gpt-4.1-mini', name: 'GPT-4.1 mini',   enc: 'o200k_base', ctx: 1000000, input: 0.4,   group: 'Codex' },
  // 레거시
  { id: 'gpt-4',        name: 'GPT-4',          enc: 'cl100k_base',ctx: 8192,    input: 30,    group: 'Legacy' },
  { id: 'gpt-3.5-turbo',name:'GPT-3.5 Turbo',  enc: 'cl100k_base',ctx: 16385,   input: 0.5,   group: 'Legacy' },
];

const ENC_LABEL = { 'o200k_base': 'o200k', 'cl100k_base': 'cl100k', 'p50k_base': 'p50k' };
const ENC_CLASS = { 'o200k_base': 'enc-o200k', 'cl100k_base': 'enc-cl100k', 'p50k_base': 'enc-p50k' };
const COLORS = ['#6c63ff33','#00d4aa33','#ff6b6b33','#ffd16633','#a29bfe33','#74b9ff33','#fd79a833'];

let selectedModel = MODELS[0];
let tokenCache = [];

// ===== 모델 버튼 렌더 =====
const grid = document.getElementById('model-grid');
let lastGroup = '';
MODELS.forEach((m, i) => {
  if (m.group !== lastGroup) {
    const sep = document.createElement('div');
    sep.style.cssText = 'grid-column:1/-1; font-size:0.7rem; color:var(--muted); font-weight:600; padding:4px 2px 0; text-transform:uppercase; letter-spacing:1px;';
    sep.textContent = m.group;
    grid.appendChild(sep);
    lastGroup = m.group;
  }
  const btn = document.createElement('button');
  btn.className = 'model-btn' + (i === 0 ? ' active' : '');
  btn.dataset.idx = i;
  const encLabel = ENC_LABEL[m.enc] || m.enc;
  const encClass = ENC_CLASS[m.enc] || '';
  const ctxStr = m.ctx >= 1000000 ? (m.ctx/1000000)+'M' : (m.ctx/1000)+'K';
  btn.innerHTML = `<div class="model-name">${m.name}</div>
    <div class="model-ctx">ctx: ${ctxStr}</div>
    <span class="enc-badge ${encClass}">${encLabel}</span>`;
  btn.onclick = () => selectModel(i);
  grid.appendChild(btn);
});

function selectModel(idx) {
  document.querySelectorAll('.model-btn').forEach(b => b.classList.toggle('active', +b.dataset.idx === idx));
  selectedModel = MODELS[idx];
  updateStats();
}

// ===== 토크나이즈 =====
function tokenize(text) {
  if (!text) return [];
  try {
    // gpt-tokenizer는 cl100k (GPT-4 계열) 기본 지원
    // o200k는 근사치로 cl100k 사용 (실제 차이 ~2~5%)
    return encode(text);
  } catch(e) {
    // 폴백: 단순 근사
    return text.split(/\s+/).filter(Boolean);
  }
}

// ===== 업데이트 =====
function updateStats() {
  const text = document.getElementById('input-text').value;
  tokenCache = tokenize(text);
  const tokenCount = tokenCache.length;
  const charCount = text.length;
  const wordCount = text.trim() ? text.trim().split(/\s+/).length : 0;
  const ctxPct = selectedModel.ctx ? Math.min(100, (tokenCount / selectedModel.ctx * 100)) : 0;

  document.getElementById('stat-tokens').textContent = tokenCount.toLocaleString();
  document.getElementById('stat-chars').textContent = charCount.toLocaleString();
  document.getElementById('stat-words').textContent = wordCount.toLocaleString();
  document.getElementById('stat-ctx-pct').textContent = ctxPct.toFixed(1) + '%';

  // 컨텍스트 바
  const ctxStr = selectedModel.ctx >= 1000000 ? (selectedModel.ctx/1000000)+'M' : (selectedModel.ctx/1000)+'K';
  document.getElementById('ctx-model-name').textContent = selectedModel.name;
  document.getElementById('ctx-info').textContent = `${tokenCount.toLocaleString()} / ${selectedModel.ctx.toLocaleString()} tokens`;
  const bar = document.getElementById('ctx-bar');
  bar.style.width = ctxPct + '%';
  bar.style.background = ctxPct > 90 ? 'var(--danger)' : ctxPct > 70 ? 'var(--warn)' : 'var(--accent)';

  // 비용 테이블
  const tbody = document.getElementById('cost-tbody');
  tbody.innerHTML = '';
  const priced = MODELS.filter(m => m.input != null);
  priced.forEach(m => {
    const cost = (tokenCount / 1000000 * m.input).toFixed(6);
    const tr = document.createElement('tr');
    if (m.id === selectedModel.id) tr.className = 'highlight';
    tr.innerHTML = `<td>${m.name}</td><td>$${m.input}</td><td>$${cost}</td>`;
    tbody.appendChild(tr);
  });

  // 토큰 시각화
  renderTokenViz(text, tokenCache);
}

function renderTokenViz(text, tokens) {
  const el = document.getElementById('token-display');
  if (!text) { el.textContent = '텍스트를 입력하면 토큰 단위로 색상이 표시됩니다.'; return; }
  if (tokens.length > 2000) { el.textContent = `토큰이 너무 많습니다 (${tokens.length.toLocaleString()}개). 2000개 이하만 시각화합니다.`; return; }

  try {
    let html = '';
    let pos = 0;
    const fullText = text;
    tokens.forEach((tok, i) => {
      const decoded = new TextDecoder().decode(new Uint8Array(decode([tok])));
      const color = COLORS[i % COLORS.length];
      const safe = decoded.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'↵\n');
      html += `<span style="background:${color};border-radius:3px;padding:1px 0" title="토큰 #${i+1}: ${tok}">${safe}</span>`;
    });
    el.innerHTML = html;
  } catch(e) {
    el.textContent = `${tokens.length.toLocaleString()}개 토큰 (시각화 오류)`;
  }
}

function clearText() {
  document.getElementById('input-text').value = '';
  updateStats();
}

// 입력 이벤트
let debounceTimer;
document.getElementById('input-text').addEventListener('input', () => {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(updateStats, 150);
});

// 초기화
updateStats();
</script>

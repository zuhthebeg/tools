<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="description" content="서버 없이 브라우저에서 100% 실행되는 온디바이스 AI 비전. 사진 속 물건·텍스트를 WebGPU로 즉시 인식. 이미지가 외부로 전송되지 않습니다 (SmolVLM).">
<link rel="icon" href="icon.svg">
<title>온디바이스 AI 비전 — 브라우저에서 사진 인식</title>
<style>
  :root { --bg:#0e0f1a; --card:#1a1c2e; --line:#2c2f47; --fg:#e8e9f3; --mut:#9aa0c0; --acc:#5b8cff; --ok:#3ecf8e; --warn:#ffb86b; --bad:#ff6b6b; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { margin:0; background:var(--bg); color:var(--fg); font:15px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Apple SD Gothic Neo","Noto Sans KR",sans-serif; padding:16px; max-width:560px; margin:0 auto; }
  h1 { font-size:1.25rem; margin:.2em 0 .1em; }
  .sub { color:var(--mut); font-size:.82rem; margin-bottom:14px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:14px; padding:14px; margin-bottom:12px; }
  label { display:block; font-size:.8rem; color:var(--mut); margin-bottom:5px; }
  select, textarea, input[type=text] { width:100%; background:#12141f; color:var(--fg); border:1px solid var(--line); border-radius:9px; padding:10px; font:inherit; }
  textarea { resize:vertical; min-height:54px; }
  button { width:100%; border:0; border-radius:11px; padding:13px; font:600 15px/1 inherit; color:#fff; background:var(--acc); cursor:pointer; margin-top:8px; }
  button:disabled { opacity:.45; cursor:not-allowed; }
  button.ghost { background:#262a40; }
  .row { display:flex; gap:8px; }
  .row > * { flex:1; }
  .badge { display:inline-block; font-size:.72rem; padding:2px 8px; border-radius:20px; font-weight:700; }
  .b-ok { background:rgba(62,207,142,.16); color:var(--ok); }
  .b-bad { background:rgba(255,107,107,.16); color:var(--bad); }
  #preview { width:100%; border-radius:11px; margin-top:10px; display:none; max-height:340px; object-fit:contain; background:#000; }
  #out { white-space:pre-wrap; word-break:break-word; background:#0b0c15; border:1px solid var(--line); border-radius:10px; padding:12px; min-height:40px; font-size:.92rem; }
  .stat { display:flex; justify-content:space-between; font-size:.84rem; padding:4px 0; border-bottom:1px dashed var(--line); }
  .stat:last-child { border:0; }
  .stat b { color:var(--acc); }
  .prog { height:7px; background:#12141f; border-radius:6px; overflow:hidden; margin-top:8px; }
  .prog > i { display:block; height:100%; width:0; background:var(--acc); transition:width .2s; }
  .mut { color:var(--mut); font-size:.8rem; }
  code { background:#12141f; padding:1px 5px; border-radius:5px; font-size:.85em; }
</style>
</head>
<body>
  <h1>🔬 온디바이스 비전 테스트</h1>
  <div class="sub">SmolVLM (Transformers.js + WebGPU) · 브라우저 안에서 100% 실행 · 사진 외부 전송 0</div>

  <div class="card">
    <div class="stat"><span>WebGPU 지원</span><span id="gpuState" class="badge b-bad">확인중…</span></div>
    <div class="stat"><span>모델 상태</span><span id="modelState" class="mut">미로딩</span></div>
  </div>

  <div class="card">
    <label>모델 선택 (작을수록 빠름 / 다운로드 작음)</label>
    <select id="modelSel">
      <option value="HuggingFaceTB/SmolVLM-256M-Instruct">SmolVLM-256M (≈230MB · 가장 빠름)</option>
      <option value="HuggingFaceTB/SmolVLM-500M-Instruct">SmolVLM-500M (≈500MB · 더 정확)</option>
    </select>
    <button id="loadBtn">① 모델 로드 (첫 1회만 다운로드, 이후 캐시)</button>
    <div class="prog"><i id="prog"></i></div>
    <div id="progTxt" class="mut" style="margin-top:6px"></div>
  </div>

  <div class="card">
    <label>② 사진 (제품 찍기 / 갤러리)</label>
    <div class="row">
      <button class="ghost" id="camBtn">📷 카메라</button>
      <button class="ghost" id="galBtn">🖼️ 갤러리</button>
    </div>
    <input type="file" id="camIn" accept="image/*" capture="environment" hidden>
    <input type="file" id="galIn" accept="image/*" hidden>
    <img id="preview" alt="">
  </div>

  <div class="card">
    <label>③ 프롬프트</label>
    <textarea id="prompt">What consumable household product is in this image? Reply ONLY as JSON: {"name":"...","category":"...","label_text":"...","est_lifespan_days":0}. Use the product's own language for name/label_text.</textarea>
    <button id="runBtn" disabled>③ 인식 실행</button>
  </div>

  <div class="card">
    <label>결과</label>
    <div id="out">—</div>
    <div class="stat" style="margin-top:10px"><span>모델 로드</span><b id="tLoad">—</b></div>
    <div class="stat"><span>추론 시간</span><b id="tInfer">—</b></div>
    <div class="stat"><span>생성 토큰</span><b id="tTok">—</b></div>
  </div>

  <div class="mut">팁: 처음 로드는 모델 다운로드(수백 MB)로 느릴 수 있다. 같은 브라우저면 다음부터 캐시에서 즉시 로드. WebGPU 미지원이면 자동으로 느린 WASM로 떨어진다.</div>

<script type="module">
import { AutoProcessor, AutoModelForVision2Seq, load_image, env }
  from "https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.8.1";

const $ = id => document.getElementById(id);
let processor = null, model = null, loadedId = null, curImage = null, hasGPU = false;

// WebGPU 감지
(async () => {
  try {
    if (navigator.gpu && await navigator.gpu.requestAdapter()) {
      hasGPU = true;
      $("gpuState").textContent = "지원 ✓ (WebGPU)";
      $("gpuState").className = "badge b-ok";
    } else throw 0;
  } catch {
    $("gpuState").textContent = "미지원 → WASM";
    $("gpuState").className = "badge b-bad";
  }
})();

function fileToImg(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => { $("preview").src = r.result; $("preview").style.display = "block"; res(r.result); };
    r.onerror = rej; r.readAsDataURL(file);
  });
}
$("camBtn").onclick = () => $("camIn").click();
$("galBtn").onclick = () => $("galIn").click();
async function onPick(e) {
  const f = e.target.files[0]; if (!f) return;
  const dataUrl = await fileToImg(f);
  curImage = await load_image(dataUrl);
  if (model) $("runBtn").disabled = false;
  $("out").textContent = "사진 준비됨. ③ 인식 실행을 눌러.";
}
$("camIn").onchange = onPick;
$("galIn").onchange = onPick;

$("loadBtn").onclick = async () => {
  const id = $("modelSel").value;
  if (loadedId === id && model) { $("modelState").textContent = "이미 로드됨 ✓"; return; }
  $("loadBtn").disabled = true; $("modelSel").disabled = true;
  $("modelState").textContent = "로딩중…";
  const files = {};
  const cb = (p) => {
    if (p.status === "progress" && p.file) {
      files[p.file] = (p.loaded / (p.total || 1)) * 100;
      const vals = Object.values(files);
      const avg = vals.reduce((a, b) => a + b, 0) / vals.length;
      $("prog").style.width = avg.toFixed(0) + "%";
      $("progTxt").textContent = `${p.file.split("/").pop()} … ${(p.progress || 0).toFixed(0)}%`;
    } else if (p.status === "done") {
      $("progTxt").textContent = "압축 해제/초기화…";
    }
  };
  const t0 = performance.now();
  try {
    processor = await AutoProcessor.from_pretrained(id, { progress_callback: cb });
    model = await AutoModelForVision2Seq.from_pretrained(id, {
      dtype: { embed_tokens: "fp16", vision_encoder: "fp16", decoder_model_merged: "q4" },
      device: hasGPU ? "webgpu" : "wasm",
      progress_callback: cb,
    });
    loadedId = id;
    const dt = ((performance.now() - t0) / 1000).toFixed(1);
    $("tLoad").textContent = dt + "s";
    $("prog").style.width = "100%";
    $("progTxt").textContent = "";
    $("modelState").innerHTML = `로드 완료 ✓ (${hasGPU ? "WebGPU" : "WASM"})`;
    if (curImage) $("runBtn").disabled = false;
  } catch (err) {
    $("modelState").textContent = "로드 실패";
    $("out").textContent = "모델 로드 에러: " + (err?.message || err);
    console.error(err);
  } finally {
    $("loadBtn").disabled = false; $("modelSel").disabled = false;
  }
};

$("runBtn").onclick = async () => {
  if (!model || !curImage) return;
  $("runBtn").disabled = true; $("out").textContent = "인식중…";
  try {
    const messages = [{ role: "user", content: [{ type: "image" }, { type: "text", text: $("prompt").value }] }];
    const text = processor.apply_chat_template(messages, { add_generation_prompt: true });
    const inputs = await processor(text, [curImage], { do_image_splitting: false });
    const t0 = performance.now();
    const out = await model.generate({ ...inputs, max_new_tokens: 256, do_sample: false, repetition_penalty: 1.1 });
    const dt = (performance.now() - t0) / 1000;
    const promptLen = inputs.input_ids.dims.at(-1);
    const gen = out.slice(null, [promptLen, null]);
    const decoded = processor.batch_decode(gen, { skip_special_tokens: true });
    const ntok = out.dims.at(-1) - promptLen;
    $("out").textContent = (decoded[0] || "").trim() || "(빈 응답)";
    $("tInfer").textContent = dt.toFixed(1) + "s";
    $("tTok").textContent = `${ntok} (${(ntok / dt).toFixed(1)} tok/s)`;
  } catch (err) {
    $("out").textContent = "추론 에러: " + (err?.message || err);
    console.error(err);
  } finally {
    $("runBtn").disabled = false;
  }
};
</script>
</body>
</html>

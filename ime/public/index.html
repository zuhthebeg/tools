<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IME Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .active-project { @apply bg-blue-100 border-blue-500; }
    </style>
</head>
<body class="bg-gray-50 h-screen flex flex-col">
    <!-- Header -->
    <header class="bg-white border-b px-6 py-4 flex justify-between items-center">
        <h1 class="text-xl font-bold text-gray-800">Webtoon Translation IME</h1>
        <div class="space-x-2">
            <button onclick="importBulk()" class="border px-4 py-2 rounded hover:bg-gray-100">Import</button>
            <button onclick="exportIME()" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">IME Export</button>
            <button class="border px-4 py-2 rounded hover:bg-gray-100">Backup</button>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <!-- Left Sidebar: Projects -->
        <aside class="w-64 bg-white border-r flex flex-col">
            <div class="p-4 border-b flex justify-between items-center">
                <h2 class="font-semibold">작품 목록</h2>
                <button onclick="addProject()" class="text-blue-600 text-sm hover:underline">+ 추가</button>
            </div>
            <ul id="project-list" class="flex-1 overflow-y-auto p-2 space-y-1">
                <!-- Project items here -->
            </ul>
        </aside>

        <!-- Center: IME Entries -->
        <main class="flex-1 flex flex-col bg-white">
            <div class="p-4 border-b flex justify-between items-center bg-gray-50">
                <h2 class="font-semibold">IME 사전 (활성화된 작품)</h2>
                <div class="space-x-2">
                    <input type="text" id="ime-search" placeholder="검색..." class="border rounded px-2 py-1 text-sm">
                    <button onclick="addIMEEntry()" class="bg-green-600 text-white px-3 py-1 rounded text-sm hover:bg-green-700">+ 단어 등록</button>
                </div>
            </div>
            <div class="flex-1 overflow-y-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-gray-100 sticky top-0">
                        <tr>
                            <th class="p-3 border-b text-sm font-medium">원본 (중국어)</th>
                            <th class="p-3 border-b text-sm font-medium">주음부호 (Bopomofo)</th>
                            <th class="p-3 border-b text-sm font-medium">약칭</th>
                            <th class="p-3 border-b text-sm font-medium">관리</th>
                        </tr>
                    </thead>
                    <tbody id="ime-list">
                        <!-- IME entries here -->
                    </tbody>
                </table>
            </div>
        </main>

        <!-- Right: KB Search Panel -->
        <aside class="w-80 bg-gray-50 border-l flex flex-col">
            <div class="p-4 border-b bg-white">
                <h2 class="font-semibold mb-2">번역 지식베이스</h2>
                <input type="text" id="kb-search" oninput="searchKB()" placeholder="한국어/중국어/태그 검색..." class="w-full border rounded px-3 py-2 text-sm">
            </div>
            <div id="kb-list" class="flex-1 overflow-y-auto p-4 space-y-4">
                <!-- KB entries here -->
            </div>
            <div class="p-4 border-t bg-white">
                <button onclick="addKBEntry()" class="w-full bg-gray-800 text-white py-2 rounded text-sm hover:bg-gray-900">새 지식 등록</button>
            </div>
        </aside>
    </div>

    <script>
        // API Base (Relative for production)
        const API_BASE = '/api';

        async function fetchJSON(url, options = {}) {
            const res = await fetch(url, options);
            return res.json();
        }

        async function loadProjects() {
            const projects = await fetchJSON(`${API_BASE}/projects`);
            const list = document.getElementById('project-list');
            list.innerHTML = projects.map(p => `
                <li class="flex items-center justify-between p-2 rounded hover:bg-gray-100 cursor-pointer ${p.is_active ? 'bg-blue-50 border-l-4 border-blue-500' : ''}">
                    <span class="truncate">${p.name}</span>
                    <input type="checkbox" ${p.is_active ? 'checked' : ''} onclick="toggleProject(${p.id}, this.checked)">
                </li>
            `).join('');
            loadIMEEntries();
        }

        async function toggleProject(id, active) {
            await fetch(`${API_BASE}/projects/${id}/active`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ is_active: active })
            });
            loadProjects();
        }

        async function loadIMEEntries() {
            const entries = await fetchJSON(`${API_BASE}/ime`);
            const list = document.getElementById('ime-list');
            list.innerHTML = entries.map(e => `
                <tr class="hover:bg-gray-50">
                    <td class="p-3 border-b">${e.original}</td>
                    <td class="p-3 border-b font-mono text-xs">${e.bopomofo || '-'}</td>
                    <td class="p-3 border-b text-gray-600">${e.short_form || '-'}</td>
                    <td class="p-3 border-b text-sm">
                        <button class="text-red-500 hover:underline">삭제</button>
                    </td>
                </tr>
            `).join('');
        }

        async function searchKB() {
            const q = document.getElementById('kb-search').value;
            const entries = await fetchJSON(`${API_BASE}/kb?q=${encodeURIComponent(q)}`);
            const list = document.getElementById('kb-list');
            list.innerHTML = entries.map(e => `
                <div class="bg-white p-3 rounded border shadow-sm">
                    <div class="flex justify-between items-start mb-1">
                        <span class="text-xs font-bold text-blue-600 uppercase">${e.category || '기본'}</span>
                        <span class="text-xs text-gray-400">#${e.tags || ''}</span>
                    </div>
                    <div class="font-bold text-gray-800">${e.ko}</div>
                    <div class="text-green-700 mt-1">→ ${e.zh_tw}</div>
                    ${e.note ? `<p class="text-xs text-gray-500 mt-2 border-t pt-1">${e.note}</p>` : ''}
                </div>
            `).join('');
        }

        async function addProject() {
            const name = prompt('작품명을 입력하세요:');
            if (!name) return;
            await fetch(`${API_BASE}/projects`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name })
            });
            loadProjects();
        }

        async function addIMEEntry() {
            const activeProject = document.querySelector('#project-list li.bg-blue-50');
            if (!activeProject) {
                alert('활성화된 작품이 없습니다. 작품을 먼저 활성화해주세요.');
                return;
            }
            
            const original = prompt('원본 단어(중국어)를 입력하세요:');
            if (!original) return;
            const bopomofo = prompt('주음부호를 입력하세요 (예: ㄌㄧㄡˇ ㄒㄩ ㄏㄢˊ):');
            
            // Auto-generate short form (last 2 chars)
            let short_form = original.length > 2 ? original.slice(-2) : original;
            const customShort = prompt(`약칭을 입력하세요 (기본값: ${short_form}):`, short_form);
            if (customShort !== null) short_form = customShort;

            // Get active project ID
            const projects = await fetchJSON(`${API_BASE}/projects`);
            const activeId = projects.find(p => p.is_active)?.id;

            await fetch(`${API_BASE}/ime`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ project_id: activeId, original, bopomofo, short_form })
            });
            loadIMEEntries();
        }

        async function addKBEntry() {
            const ko = prompt('한국어 표현:');
            if (!ko) return;
            const zh_tw = prompt('번체중국어 번역:');
            const category = prompt('카테고리 (예: 무협, 게임, 밈):');
            const tags = prompt('태그 (쉼표 구분):');
            const note = prompt('메모:');

            await fetch(`${API_BASE}/kb`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ ko, zh_tw, category, tags, note })
            });
            searchKB();
        }

        function exportIME() {
            window.location.href = `${API_BASE}/export`;
        }

        // Initialization
        loadProjects();
        searchKB();
    </script>
</body>
</html>

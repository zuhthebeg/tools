<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IME Manager</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }
  </style>
</head>
<body class="bg-slate-50 h-screen flex flex-col text-slate-900 text-sm select-none">

  <!-- Header -->
  <header class="bg-white border-b px-5 py-2.5 flex justify-between items-center shadow-sm shrink-0">
    <div class="flex items-center gap-2.5">
      <div class="w-7 h-7 bg-blue-600 rounded-lg flex items-center justify-center text-white font-black text-xs">IM</div>
      <h1 class="font-bold tracking-tight">Webtoon <span class="text-blue-600">IME</span> Workflow</h1>
    </div>
    <div class="flex gap-2">
      <button onclick="openImport()" class="px-3 py-1.5 text-xs border rounded-lg hover:bg-slate-50 transition-colors font-medium">Bulk Import</button>
      <button onclick="exportIME()" class="px-3 py-1.5 text-xs bg-blue-600 text-white rounded-lg hover:bg-blue-700 shadow-sm transition-colors font-bold">IME Export</button>
    </div>
  </header>

  <div class="flex flex-1 overflow-hidden">

    <!-- Left: Projects -->
    <aside class="w-56 bg-white border-r flex flex-col shrink-0">
      <div class="px-4 py-3 border-b flex justify-between items-center">
        <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">작품</span>
        <button onclick="openAddProject()" class="w-5 h-5 flex items-center justify-center rounded-full bg-blue-50 text-blue-600 hover:bg-blue-100 font-bold text-xs">+</button>
      </div>
      <ul id="project-list" class="flex-1 overflow-y-auto p-2 space-y-0.5"></ul>
    </aside>

    <!-- Center: IME Entries -->
    <main class="flex-1 flex flex-col bg-white min-w-0">
      <div class="px-5 py-3 border-b flex justify-between items-center shrink-0">
        <h2 id="panel-title" class="font-bold text-slate-700 truncate">IME 사전</h2>
        <div class="flex gap-2 shrink-0">
          <input type="text" id="ime-search" oninput="filterIME(this.value)" placeholder="검색..." class="px-3 py-1.5 border rounded-lg text-xs focus:ring-2 focus:ring-blue-500 outline-none w-36">
          <button onclick="openAddIME()" class="bg-slate-900 text-white px-3 py-1.5 rounded-lg text-xs hover:bg-slate-700 transition-colors font-bold">+ 등록</button>
        </div>
      </div>
      <div id="ime-empty" class="flex-1 flex items-center justify-center text-slate-300 text-xs hidden">
        좌측에서 작품을 선택하세요
      </div>
      <div class="flex-1 overflow-y-auto">
        <table class="w-full text-left">
          <thead class="bg-white sticky top-0 z-10 shadow-[0_1px_0_#e2e8f0]">
            <tr class="text-[10px] font-black text-slate-400 uppercase tracking-widest">
              <th class="px-5 py-3 w-[35%]">원본 (중국어)</th>
              <th class="px-5 py-3 w-[35%] text-blue-400">주음부호</th>
              <th class="px-5 py-3 w-[15%]">약칭</th>
              <th class="px-5 py-3 w-[15%]"></th>
            </tr>
          </thead>
          <tbody id="ime-list" class="divide-y divide-slate-50"></tbody>
        </table>
      </div>
    </main>

    <!-- Right: KB -->
    <aside class="w-72 bg-slate-50 border-l flex flex-col shrink-0">
      <div class="px-4 py-3 border-b bg-white">
        <div class="flex justify-between items-center mb-2.5">
          <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">번역 지식베이스</span>
          <button onclick="openAddKB()" class="text-blue-600 text-[10px] font-black hover:underline">+ NEW</button>
        </div>
        <input type="text" id="kb-search" oninput="searchKB()" placeholder="한국어 / 중국어 / 태그..." class="w-full px-3 py-2 border rounded-lg text-xs focus:ring-2 focus:ring-blue-500 outline-none bg-slate-50">
      </div>
      <div id="kb-list" class="flex-1 overflow-y-auto p-3 space-y-2"></div>
    </aside>

  </div>

  <!-- Modal -->
  <div id="modal" class="fixed inset-0 bg-slate-900/60 hidden z-50 flex items-center justify-center p-4 backdrop-blur-sm" onclick="if(event.target===this)closeModal()">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md border border-slate-100 overflow-hidden">
      <div class="px-5 py-4 border-b flex justify-between items-center bg-slate-50">
        <h3 id="modal-title" class="font-bold text-slate-800"></h3>
        <button onclick="closeModal()" class="text-slate-400 hover:text-slate-700 text-xl leading-none">&times;</button>
      </div>
      <div id="modal-body" class="p-5"></div>
      <div id="modal-footer" class="px-5 py-4 border-t bg-slate-50 flex justify-end gap-2">
        <button onclick="closeModal()" class="px-4 py-2 text-xs font-medium text-slate-600 hover:bg-slate-100 rounded-lg">취소</button>
        <button id="modal-ok" class="px-4 py-2 text-xs font-bold bg-blue-600 text-white rounded-lg hover:bg-blue-700 active:scale-95 transition-all">저장</button>
      </div>
    </div>
  </div>

  <!-- Confirm Modal -->
  <div id="confirm-modal" class="fixed inset-0 bg-slate-900/60 hidden z-[60] flex items-center justify-center p-4 backdrop-blur-sm">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm border border-slate-100 overflow-hidden">
      <div class="p-5">
        <p id="confirm-msg" class="text-slate-700 font-medium mb-1"></p>
        <p class="text-xs text-slate-400">이 작업은 되돌릴 수 없습니다.</p>
      </div>
      <div class="px-5 py-3 border-t bg-slate-50 flex justify-end gap-2">
        <button onclick="closeConfirm(false)" class="px-4 py-2 text-xs font-medium text-slate-600 hover:bg-slate-100 rounded-lg">취소</button>
        <button id="confirm-ok" class="px-4 py-2 text-xs font-bold bg-red-500 text-white rounded-lg hover:bg-red-600 active:scale-95 transition-all">삭제</button>
      </div>
    </div>
  </div>

  <script>
    const API = '/api';
    let allIMEEntries = [];
    let confirmResolve = null;

    // ── Utils ──────────────────────────────────────────────────────
    async function api(method, path, body) {
      const opts = { method, headers: { 'Content-Type': 'application/json' } };
      if (body) opts.body = JSON.stringify(body);
      const res = await fetch(API + path, opts);
      if (!res.ok) throw new Error(await res.text());
      return res.json();
    }

    function openModal(title, bodyHTML, onOk, okLabel = '저장') {
      document.getElementById('modal-title').textContent = title;
      document.getElementById('modal-body').innerHTML = bodyHTML;
      document.getElementById('modal').classList.remove('hidden');
      const okBtn = document.getElementById('modal-ok');
      okBtn.textContent = okLabel;
      okBtn.onclick = async () => {
        okBtn.disabled = true;
        okBtn.textContent = '처리 중...';
        try { await onOk(); closeModal(); }
        catch (e) { alert('오류: ' + e.message); }
        finally { okBtn.disabled = false; okBtn.textContent = okLabel; }
      };
      setTimeout(() => document.querySelector('#modal-body input, #modal-body textarea')?.focus(), 80);
    }

    function closeModal() { document.getElementById('modal').classList.add('hidden'); }

    function confirm(msg) {
      return new Promise(resolve => {
        confirmResolve = resolve;
        document.getElementById('confirm-msg').textContent = msg;
        document.getElementById('confirm-modal').classList.remove('hidden');
        document.getElementById('confirm-ok').onclick = () => { closeConfirm(true); };
      });
    }

    function closeConfirm(yes) {
      document.getElementById('confirm-modal').classList.add('hidden');
      if (confirmResolve) { confirmResolve(yes); confirmResolve = null; }
    }

    function val(id) { return document.getElementById(id)?.value?.trim() ?? ''; }

    // ── Projects ──────────────────────────────────────────────────
    async function loadProjects() {
      const projects = await api('GET', '/projects');
      const ul = document.getElementById('project-list');
      ul.innerHTML = projects.map(p => `
        <li class="group flex items-center justify-between px-3 py-2.5 rounded-xl cursor-pointer transition-all
            ${p.is_active ? 'bg-blue-50 text-blue-700 font-bold' : 'text-slate-500 hover:bg-slate-50'}">
          <span class="truncate flex-1 text-xs" onclick="toggleProject(${p.id}, ${p.is_active ? 0 : 1})">${p.name}</span>
          <div class="flex items-center gap-1.5 ml-1">
            <span class="w-1.5 h-1.5 rounded-full ${p.is_active ? 'bg-blue-500' : 'bg-slate-200'}"></span>
            <button onclick="deleteProject(${p.id}, '${p.name.replace(/'/g, "\\'")}')"
              class="opacity-0 group-hover:opacity-100 text-slate-300 hover:text-red-400 text-xs font-bold transition-opacity">×</button>
          </div>
        </li>
      `).join('');

      const active = projects.find(p => p.is_active);
      document.getElementById('panel-title').textContent = active ? `IME — ${active.name}` : 'IME 사전';
      loadIMEEntries();
    }

    async function toggleProject(id, active) {
      await api('PATCH', `/projects/${id}/active`, { is_active: active });
      loadProjects();
    }

    async function deleteProject(id, name) {
      const ok = await confirm(`"${name}" 작품을 삭제하시겠습니까? 소속 단어도 모두 삭제됩니다.`);
      if (!ok) return;
      await api('DELETE', `/projects/${id}`);
      loadProjects();
    }

    function openAddProject() {
      openModal('새 작품 추가', `
        <div>
          <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1.5">작품명</label>
          <input id="f-p-name" type="text" required placeholder="예: 무림지존" class="w-full border rounded-xl px-4 py-2.5 text-sm outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50">
        </div>
      `, async () => {
        const name = val('f-p-name');
        if (!name) throw new Error('작품명을 입력해주세요');
        await api('POST', '/projects', { name });
        loadProjects();
      });
    }

    // ── IME ───────────────────────────────────────────────────────
    async function loadIMEEntries() {
      allIMEEntries = await api('GET', '/ime');
      renderIME(allIMEEntries);
    }

    function renderIME(entries) {
      const tbody = document.getElementById('ime-list');
      const empty = document.getElementById('ime-empty');
      if (!entries.length) {
        tbody.innerHTML = '';
        empty.classList.remove('hidden');
        return;
      }
      empty.classList.add('hidden');
      tbody.innerHTML = entries.map(e => `
        <tr class="hover:bg-slate-50/80 group transition-colors">
          <td class="px-5 py-3 font-medium text-slate-900">${e.original}
            ${e._dupe ? '<span class="ml-1 text-[9px] bg-amber-100 text-amber-600 font-black px-1 py-0.5 rounded">중복</span>' : ''}
          </td>
          <td class="px-5 py-3 font-mono text-xs text-blue-600">${e.bopomofo || '<span class="text-slate-300">—</span>'}</td>
          <td class="px-5 py-3"><span class="font-mono text-[10px] bg-slate-100 text-slate-500 px-1.5 py-0.5 rounded">${e.short_form || '—'}</span></td>
          <td class="px-5 py-3 text-right">
            <span class="opacity-0 group-hover:opacity-100 transition-opacity flex justify-end gap-2">
              <button onclick="openEditIME(${e.id})" class="text-slate-300 hover:text-blue-500 text-xs font-bold">수정</button>
              <button onclick="deleteIME(${e.id}, '${e.original.replace(/'/g, "\\'")}')" class="text-slate-300 hover:text-red-500 text-xs font-bold">삭제</button>
            </span>
          </td>
        </tr>
      `).join('');
    }

    function filterIME(q) {
      if (!q) { renderIME(allIMEEntries); return; }
      const lq = q.toLowerCase();
      renderIME(allIMEEntries.filter(e =>
        e.original.toLowerCase().includes(lq) ||
        (e.bopomofo || '').toLowerCase().includes(lq) ||
        (e.short_form || '').toLowerCase().includes(lq)
      ));
    }

    function openAddIME() {
      openModal('단어 등록', imeForm(), async () => {
        const original = val('f-i-orig');
        if (!original) throw new Error('원본을 입력해주세요');
        const projects = await api('GET', '/projects');
        const activeId = projects.find(p => p.is_active)?.id;
        if (!activeId) throw new Error('활성화된 작품이 없습니다');
        const res = await api('POST', '/ime', {
          project_id: activeId,
          original,
          bopomofo: val('f-i-bopo'),
          short_form: val('f-i-short'),
        });
        if (res.duplicates?.length) {
          setTimeout(() => alert(`⚠️ 중복 경고: "${original}" 이(가) [${res.duplicates.join(', ')}]에 이미 있습니다.`), 50);
        }
        loadIMEEntries();
      });
    }

    function openEditIME(id) {
      const e = allIMEEntries.find(x => x.id === id);
      if (!e) return;
      openModal('단어 수정', imeForm(e), async () => {
        const original = val('f-i-orig');
        if (!original) throw new Error('원본을 입력해주세요');
        await api('PUT', `/ime/${id}`, {
          original,
          bopomofo: val('f-i-bopo'),
          short_form: val('f-i-short'),
        });
        loadIMEEntries();
      }, '저장');
    }

    function imeForm(e = {}) {
      return `
        <div class="space-y-4">
          <div>
            <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1.5">중국어 원본 *</label>
            <input id="f-i-orig" type="text" value="${e.original || ''}" oninput="autoShort(this.value)" required
              class="w-full border rounded-xl px-4 py-2.5 text-sm outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50">
          </div>
          <div>
            <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1.5">주음부호 (Bopomofo)</label>
            <input id="f-i-bopo" type="text" value="${e.bopomofo || ''}"
              placeholder="ㄌㄧㄡˇ ㄒㄩ ㄏㄢˊ"
              class="w-full border rounded-xl px-4 py-2.5 text-sm font-mono outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50">
          </div>
          <div>
            <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1.5">약칭 (자동생성)</label>
            <input id="f-i-short" type="text" value="${e.short_form || ''}"
              class="w-full border rounded-xl px-4 py-2.5 text-sm font-mono outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50">
          </div>
        </div>
      `;
    }

    function autoShort(v) {
      const el = document.getElementById('f-i-short');
      if (el && !el._edited) el.value = v.length >= 2 ? v.slice(-2) : v;
    }

    async function deleteIME(id, label) {
      const ok = await confirm(`"${label}"을(를) 삭제하시겠습니까?`);
      if (!ok) return;
      await api('DELETE', `/ime/${id}`);
      loadIMEEntries();
    }

    // ── KB ────────────────────────────────────────────────────────
    async function searchKB() {
      const q = val('kb-search');
      const entries = await api('GET', `/kb?q=${encodeURIComponent(q)}`);
      const div = document.getElementById('kb-list');
      if (!entries.length) {
        div.innerHTML = '<p class="text-center text-slate-300 text-xs pt-8">결과 없음</p>';
        return;
      }
      div.innerHTML = entries.map(e => `
        <div class="bg-white p-3 rounded-xl border border-slate-100 shadow-sm hover:shadow-md transition-all group">
          <div class="flex justify-between items-start mb-1.5">
            <span class="px-1.5 py-0.5 bg-slate-900 text-white text-[9px] font-black rounded uppercase">${e.category || '기본'}</span>
            <div class="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
              <button onclick="openEditKB(${e.id})" class="text-[10px] text-blue-400 hover:text-blue-600 font-bold">수정</button>
              <button onclick="deleteKB(${e.id}, '${(e.ko || '').replace(/'/g, "\\'")}')" class="text-[10px] text-slate-300 hover:text-red-500 font-bold">삭제</button>
            </div>
          </div>
          <div class="font-bold text-slate-800 leading-tight">${e.ko}</div>
          <div class="text-blue-600 font-bold text-xs mt-0.5">→ ${e.zh_tw}</div>
          ${(e.tags || '').split(',').filter(t => t.trim()).map(t => `<span class="inline-block mt-1 text-[9px] text-blue-400 font-medium">#${t.trim()}</span>`).join(' ')}
          ${e.note ? `<p class="text-[10px] text-slate-400 mt-2 pt-2 border-t border-slate-50 italic leading-relaxed">${e.note}</p>` : ''}
        </div>
      `).join('');
    }

    function kbForm(e = {}) {
      return `
        <div class="space-y-3">
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="block text-[10px] font-black text-slate-400 uppercase mb-1.5">한국어 *</label>
              <input id="f-k-ko" type="text" value="${e.ko || ''}" required
                class="w-full border rounded-xl px-3 py-2.5 text-sm outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50">
            </div>
            <div>
              <label class="block text-[10px] font-black text-slate-400 uppercase mb-1.5">번체중국어 *</label>
              <input id="f-k-zh" type="text" value="${e.zh_tw || ''}" required
                class="w-full border rounded-xl px-3 py-2.5 text-sm outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50">
            </div>
          </div>
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="block text-[10px] font-black text-slate-400 uppercase mb-1.5">카테고리</label>
              <input id="f-k-cat" type="text" value="${e.category || ''}" placeholder="무협, 밈..."
                class="w-full border rounded-xl px-3 py-2.5 text-sm outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50">
            </div>
            <div>
              <label class="block text-[10px] font-black text-slate-400 uppercase mb-1.5">태그</label>
              <input id="f-k-tags" type="text" value="${e.tags || ''}" placeholder="쉼표 구분"
                class="w-full border rounded-xl px-3 py-2.5 text-sm outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50">
            </div>
          </div>
          <div>
            <label class="block text-[10px] font-black text-slate-400 uppercase mb-1.5">메모</label>
            <textarea id="f-k-note" class="w-full border rounded-xl px-3 py-2.5 text-sm outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50 h-20 resize-none">${e.note || ''}</textarea>
          </div>
        </div>
      `;
    }

    function openAddKB() {
      openModal('지식베이스 추가', kbForm(), async () => {
        const ko = val('f-k-ko'), zh_tw = val('f-k-zh');
        if (!ko || !zh_tw) throw new Error('한국어, 중국어는 필수입니다');
        await api('POST', '/kb', { ko, zh_tw, category: val('f-k-cat'), tags: val('f-k-tags'), note: val('f-k-note') });
        searchKB();
      });
    }

    async function openEditKB(id) {
      const entries = await api('GET', '/kb');
      const e = entries.find(x => x.id === id);
      if (!e) return;
      openModal('지식베이스 수정', kbForm(e), async () => {
        const ko = val('f-k-ko'), zh_tw = val('f-k-zh');
        if (!ko || !zh_tw) throw new Error('한국어, 중국어는 필수입니다');
        await api('PUT', `/kb/${id}`, { ko, zh_tw, category: val('f-k-cat'), tags: val('f-k-tags'), note: val('f-k-note') });
        searchKB();
      });
    }

    async function deleteKB(id, label) {
      const ok = await confirm(`"${label}"을(를) 삭제하시겠습니까?`);
      if (!ok) return;
      await api('DELETE', `/kb/${id}`);
      searchKB();
    }

    // ── Import ────────────────────────────────────────────────────
    function openImport() {
      openModal('Bulk Import', `
        <div class="space-y-3">
          <p class="text-[10px] text-slate-400 font-bold uppercase tracking-tight">
            형식: 원본[TAB]주음부호 (한 줄 = 한 단어)
          </p>
          <textarea id="f-import" placeholder="柳胥寒\tㄌㄧㄡˇ ㄒㄩ ㄏㄢˊ&#10;尹濟恩\tㄧㄣˇ ㄐㄧˋ ㄧㄣ"
            class="w-full border rounded-xl px-4 py-3 text-xs font-mono outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50 h-44 resize-none"></textarea>
          <p id="import-status" class="text-xs text-slate-400"></p>
        </div>
      `, async () => {
        const text = document.getElementById('f-import').value.trim();
        if (!text) throw new Error('내용을 입력해주세요');
        const projects = await api('GET', '/projects');
        const activeId = projects.find(p => p.is_active)?.id;
        if (!activeId) throw new Error('활성화된 작품이 없습니다');
        const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
        let ok = 0;
        for (const line of lines) {
          const [original, bopomofo = ''] = line.split('\t');
          if (!original?.trim()) continue;
          const o = original.trim();
          await api('POST', '/ime', {
            project_id: activeId,
            original: o,
            bopomofo: bopomofo.trim(),
            short_form: o.length >= 2 ? o.slice(-2) : o,
          });
          ok++;
        }
        document.getElementById('import-status').textContent = `${ok}개 등록 완료`;
        loadIMEEntries();
      }, `Import`);
    }

    function exportIME() { window.location.href = `${API}/export`; }

    // ── Keyboard shortcuts ────────────────────────────────────────
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') { closeModal(); closeConfirm(false); }
      if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); document.getElementById('ime-search').focus(); }
      if ((e.metaKey || e.ctrlKey) && e.key === 'n') { e.preventDefault(); openAddIME(); }
    });

    // ── Init ──────────────────────────────────────────────────────
    loadProjects();
    searchKB();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({"gtm.start":new Date().getTime(),event:"gtm.js"});var f=d.getElementsByTagName(s)[0],j=d.createElement(s),dl=l!="dataLayer"?"&l="+l:"";j.async=true;j.src="https://www.googletagmanager.com/gtm.js?id="+i+dl;f.parentNode.insertBefore(j,f)})(window,document,"script","dataLayer","GTM-MV8KQGJF");</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="계산기 - 수식 입력, 환율 계산, 붙여넣기 지원">
    <title>계산기 | cocy.io</title>
    <style>
        :root {
            --bg: #0f0f14;
            --surface: #1a1a24;
            --surface-2: #22222f;
            --border: #2e2e40;
            --text: #e8e8ed;
            --text-2: #8888a0;
            --accent: #6c8aff;
            --result: #4ecdc4;
            --error: #f06;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg); color: var(--text);
            min-height: 100vh; display: flex; align-items: flex-start;
            justify-content: center; padding: 2rem 1rem;
        }
        .container { width: 100%; max-width: 480px; }
        h1 { font-size: 1.4rem; font-weight: 800; margin-bottom: 1.2rem; text-align: center; }

        /* 입력 영역 */
        .input-area {
            background: var(--surface); border: 2px solid var(--border);
            border-radius: 16px; padding: 1rem; margin-bottom: 0.75rem;
            transition: border-color 0.2s;
        }
        .input-area:focus-within { border-color: var(--accent); }
        .expr-input {
            width: 100%; background: none; border: none; color: var(--text);
            font-size: 1.5rem; font-family: 'SF Mono', 'Consolas', monospace;
            outline: none; resize: none; line-height: 1.5;
            min-height: 2.5rem; max-height: 40vh;
            overflow-y: auto;
        }
        .expr-input::placeholder { color: var(--text-2); font-size: 1.1rem; }

        /* 결과 */
        .result-area {
            background: var(--surface); border-radius: 16px; padding: 1rem;
            margin-bottom: 0.75rem; min-height: 3rem;
            display: flex; align-items: center; justify-content: space-between;
        }
        .result-value {
            font-size: 2rem; font-weight: 700; font-family: 'SF Mono', 'Consolas', monospace;
            color: var(--result); word-break: break-all;
        }
        .result-value.error { color: var(--error); font-size: 1rem; }
        .copy-btn {
            background: var(--surface-2); border: 1px solid var(--border);
            color: var(--text-2); padding: 0.4rem 0.7rem; border-radius: 8px;
            font-size: 0.75rem; cursor: pointer; white-space: nowrap; margin-left: 0.5rem;
            transition: all 0.2s; flex-shrink: 0;
        }
        .copy-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
        .copy-btn.copied { background: var(--result); color: #000; border-color: var(--result); }

        /* 히스토리 */
        .history { margin-top: 0.5rem; }
        .history-item {
            display: flex; justify-content: space-between; align-items: baseline;
            padding: 0.5rem 0.75rem; border-radius: 8px; font-size: 0.82rem;
            cursor: pointer; transition: background 0.15s;
        }
        .history-item:hover { background: var(--surface-2); }
        .history-expr { color: var(--text-2); font-family: 'SF Mono', monospace; }
        .history-result { color: var(--result); font-weight: 600; font-family: 'SF Mono', monospace; }

        /* 빠른 버튼 */
        /* 숫자패드 */
        .numpad {
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 0.5rem; margin-bottom: 0.75rem;
        }
        .num-btn {
            background: var(--surface); border: 1px solid var(--border);
            color: var(--text); padding: 0.9rem; border-radius: 12px;
            font-size: 1.2rem; font-weight: 600; cursor: pointer;
            transition: all 0.12s; text-align: center;
            font-family: 'SF Mono', 'Consolas', monospace;
            -webkit-tap-highlight-color: transparent;
        }
        .num-btn:hover { background: var(--surface-2); }
        .num-btn:active { transform: scale(0.94); background: var(--surface-2); }
        .num-btn.op { background: var(--surface-2); color: var(--accent); }
        .num-btn.op:hover { background: var(--accent); color: #fff; }
        .num-btn.op:active { background: var(--accent); color: #fff; }
        .num-btn.eq { background: var(--result); color: #000; font-weight: 800; }
        .num-btn.eq:hover { background: #3ab; }
        .num-btn.clear { background: #c0392b; color: #fff; }
        .num-btn.clear:hover { background: #e74c3c; }
        .num-btn.wide { grid-column: span 2; }

        .quick-ops {
            display: flex; gap: 0.4rem; flex-wrap: wrap; margin-bottom: 0.75rem;
        }
        .quick-btn {
            background: var(--surface); border: 1px solid var(--border);
            color: var(--text-2); padding: 0.5rem 0.8rem; border-radius: 10px;
            font-size: 0.85rem; cursor: pointer; transition: all 0.15s;
        }
        .quick-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
        .quick-btn:active { transform: scale(0.95); }

        /* 도움말 */
        .help {
            font-size: 0.72rem; color: var(--text-2); text-align: center;
            margin-top: 1rem; line-height: 1.6;
        }
        .help kbd {
            background: var(--surface-2); padding: 0.1rem 0.35rem; border-radius: 4px;
            font-family: monospace; border: 1px solid var(--border);
        }

        @media (max-width: 480px) {
            body { padding: 1rem 0.75rem; }
            .expr-input { font-size: 1.3rem; }
            .result-value { font-size: 1.6rem; }
        }
    </style>
</head>
<body>
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-MV8KQGJF" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    <div class="container">
        <h1>🧮 계산기</h1>

        <div class="input-area">
            <textarea class="expr-input" id="expr" rows="1" placeholder="수식 입력... 예: 1,234.56 * 1,450" spellcheck="false" autocomplete="off"></textarea>
        </div>

        <div class="result-area">
            <div class="result-value" id="result">0</div>
            <button class="copy-btn" id="copyBtn" onclick="copyResult()">복사</button>
        </div>

        <div class="numpad">
            <button class="num-btn clear" onclick="clearExpr()">C</button>
            <button class="num-btn op" onclick="insertOp('(')">(</button>
            <button class="num-btn op" onclick="insertOp(')')">)</button>
            <button class="num-btn op" onclick="insertOp('/')">÷</button>

            <button class="num-btn" onclick="insertNum('7')">7</button>
            <button class="num-btn" onclick="insertNum('8')">8</button>
            <button class="num-btn" onclick="insertNum('9')">9</button>
            <button class="num-btn op" onclick="insertOp('*')">×</button>

            <button class="num-btn" onclick="insertNum('4')">4</button>
            <button class="num-btn" onclick="insertNum('5')">5</button>
            <button class="num-btn" onclick="insertNum('6')">6</button>
            <button class="num-btn op" onclick="insertOp('-')">−</button>

            <button class="num-btn" onclick="insertNum('1')">1</button>
            <button class="num-btn" onclick="insertNum('2')">2</button>
            <button class="num-btn" onclick="insertNum('3')">3</button>
            <button class="num-btn op" onclick="insertOp('+')">+</button>

            <button class="num-btn" onclick="insertNum('0')">0</button>
            <button class="num-btn" onclick="insertNum('.')">.</button>
            <button class="num-btn op" onclick="backspace()">⌫</button>
            <button class="num-btn eq" onclick="saveHistory()">=</button>
        </div>

        <div class="quick-ops">
            <button class="quick-btn" onclick="insertOp('%')">%</button>
        </div>

        <div class="history" id="history"></div>

        <div class="help">
            자유 입력 · 쉼표 숫자 OK · 괄호 · % · 붙여넣기<br>
            <kbd>Enter</kbd> 히스토리 저장 · <kbd>Esc</kbd> 초기화 · 히스토리 클릭하면 재사용
        </div>
    </div>

    <script>
        const exprEl = document.getElementById('expr');
        const resultEl = document.getElementById('result');
        const historyEl = document.getElementById('history');
        const copyBtn = document.getElementById('copyBtn');
        let history = JSON.parse(localStorage.getItem('calc_history') || '[]');
        let lastResult = '';

        // 자동 높이 조절
        function autoResize() {
            exprEl.style.height = 'auto';
            exprEl.style.height = exprEl.scrollHeight + 'px';
        }

        // 수식 정리: 쉼표 제거, % → /100, × → *, ÷ → /
        function cleanExpr(raw) {
            return raw
                .replace(/,/g, '')
                .replace(/×/g, '*')
                .replace(/÷/g, '/')
                .replace(/−/g, '-')
                .replace(/%/g, '/100')
                .replace(/\s+/g, ' ')
                .trim();
        }

        // 안전한 계산 (Function 사용, eval 대신)
        function safeEval(expr) {
            // 허용: 숫자, +, -, *, /, ., (, ), 공백
            if (!/^[\d+\-*/.()\s]+$/.test(expr)) throw new Error('잘못된 문자');
            if (!expr) return '';
            return new Function('return (' + expr + ')')();
        }

        // 결과 포맷 (천 단위 쉼표)
        function formatResult(num) {
            if (typeof num !== 'number' || !isFinite(num)) return 'Error';
            // 소수점 8자리까지
            const rounded = Math.round(num * 100000000) / 100000000;
            const parts = String(rounded).split('.');
            parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ',');
            return parts.join('.');
        }

        // 실시간 계산
        function evaluate() {
            const raw = exprEl.value;
            if (!raw.trim()) {
                resultEl.textContent = '0';
                resultEl.className = 'result-value';
                lastResult = '';
                return;
            }
            try {
                const cleaned = cleanExpr(raw);
                if (!cleaned) { resultEl.textContent = '0'; return; }
                const val = safeEval(cleaned);
                if (val === undefined || val === null) {
                    resultEl.textContent = '...';
                    resultEl.className = 'result-value';
                    return;
                }
                const formatted = formatResult(val);
                resultEl.textContent = formatted;
                resultEl.className = 'result-value';
                lastResult = formatted;
            } catch {
                resultEl.textContent = '...';
                resultEl.className = 'result-value';
                lastResult = '';
            }
        }

        // 입력 이벤트
        exprEl.addEventListener('input', () => {
            autoResize();
            evaluate();
        });

        // 붙여넣기
        exprEl.addEventListener('paste', (e) => {
            // 기본 붙여넣기 허용 — 자연스럽게 텍스트 삽입됨
            // setTimeout으로 붙여넣기 후 계산
            setTimeout(() => {
                autoResize();
                evaluate();
            }, 10);
        });

        // 키보드
        exprEl.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                saveHistory();
            }
            if (e.key === 'Escape') {
                clearExpr();
            }
        });

        // 히스토리 저장
        function saveHistory() {
            const raw = exprEl.value.trim();
            if (!raw || !lastResult || lastResult === '...' || lastResult === 'Error') return;
            history.unshift({ expr: raw, result: lastResult, time: Date.now() });
            if (history.length > 20) history.pop();
            localStorage.setItem('calc_history', JSON.stringify(history));
            renderHistory();
            // 결과를 입력으로
            exprEl.value = lastResult.replace(/,/g, '');
            autoResize();
            evaluate();
        }

        // 히스토리 렌더
        function renderHistory() {
            historyEl.innerHTML = history.slice(0, 8).map((h, i) => `
                <div class="history-item" onclick="useHistory(${i})">
                    <span class="history-expr">${esc(h.expr.length > 30 ? h.expr.slice(0, 30) + '…' : h.expr)}</span>
                    <span class="history-result">= ${esc(h.result)}</span>
                </div>
            `).join('');
        }

        function useHistory(i) {
            exprEl.value = history[i].expr;
            autoResize();
            evaluate();
            exprEl.focus();
        }

        // 숫자 버튼
        function insertNum(n) {
            const start = exprEl.selectionStart;
            const end = exprEl.selectionEnd;
            const val = exprEl.value;
            exprEl.value = val.slice(0, start) + n + val.slice(end);
            exprEl.selectionStart = exprEl.selectionEnd = start + 1;
            autoResize();
            evaluate();
        }

        // 백스페이스
        function backspace() {
            const start = exprEl.selectionStart;
            const val = exprEl.value;
            if (start > 0) {
                exprEl.value = val.slice(0, start - 1) + val.slice(start);
                exprEl.selectionStart = exprEl.selectionEnd = start - 1;
            }
            autoResize();
            evaluate();
        }

        // 연산자
        function insertOp(op) {
            const start = exprEl.selectionStart;
            const end = exprEl.selectionEnd;
            const val = exprEl.value;
            const insert = (op === '+' || op === '-' || op === '*' || op === '/') ? ' ' + op + ' ' : op;
            exprEl.value = val.slice(0, start) + insert + val.slice(end);
            exprEl.selectionStart = exprEl.selectionEnd = start + insert.length;
            autoResize();
            evaluate();
            exprEl.focus();
        }

        function clearExpr() {
            exprEl.value = '';
            autoResize();
            evaluate();
            exprEl.focus();
        }

        function copyResult() {
            if (!lastResult) return;
            navigator.clipboard.writeText(lastResult.replace(/,/g, '')).then(() => {
                copyBtn.textContent = '✓';
                copyBtn.classList.add('copied');
                setTimeout(() => {
                    copyBtn.textContent = '복사';
                    copyBtn.classList.remove('copied');
                }, 1500);
            });
        }

        function esc(s) {
            const d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        // 초기화
        renderHistory();
        exprEl.focus();
    </script>
    <script src="/lib/tool-nav.js"></script>
    <script src="/lib/site-meta.js"></script>
    <script>
      SiteMeta.init({
        title: 'Calculator - tool.cocy.io',
        description: '수식 입력, 환율 계산, 붙여넣기 지원 계산기',
        url: 'https://tool.cocy.io/calc/'
      });
    </script>
</body>
